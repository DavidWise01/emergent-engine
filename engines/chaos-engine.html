<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2 CHAOS ENGINES @ 0 FULCRUM — FAIR 1:1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:'Orbitron',monospace}
  :root{color-scheme:dark}
  .glow-text{ text-shadow:0 0 12px rgba(0,255,255,.55), 0 0 24px rgba(168,85,247,.35) }
  .hud-panel{backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);background:rgba(6,7,12,.55);border:1px solid rgba(120,220,255,.14);box-shadow:inset 0 0 20px rgba(0,200,255,.04)}
  .zero-flash{animation:zeroPulse .7s ease-out}
  @keyframes zeroPulse{0%{filter:brightness(1);transform:scale(1)}30%{filter:brightness(1.8);transform:scale(1.12);text-shadow:0 0 20px rgba(255,215,0,.9),0 0 40px rgba(255,180,0,.7)}100%{filter:brightness(1);transform:scale(1)}}
  canvas{display:block}
  *{user-select:none;-webkit-user-select:none}
</style>
</head>
<body class="bg-black text-white">
<canvas id="c" class="fixed inset-0 w-full h-full"></canvas>

<!-- UI OVERLAY -->
<div class="pointer-events-none absolute inset-0">
  <!-- Top Bar -->
  <div class="flex justify-between items-start p-4 md:p-7">
    <div class="hud-panel px-3 py-2 rounded-lg text-[10px] md:text-[11px] tracking-[0.22em] text-cyan-300/90">2 CHAOS ENGINES</div>
    <div class="text-center">
      <div class="text-lg md:text-[22px] font-extrabold tracking-[0.28em] glow-text text-teal-200">FULCRUM = 0</div>
      <div class="text-[10px] tracking-[0.3em] text-violet-300/70 mt-1">rep = perp = 1</div>
    </div>
    <div class="hud-panel px-3 py-2 rounded-lg text-[10px] md:text-[11px] tracking-[0.22em] text-fuchsia-300/90">FAIR 1:1</div>
  </div>

  <!-- Center Score -->
  <div class="absolute left-1/2 top-[46%] -translate-x-1/2 -translate-y-1/2 text-center">
    <div class="text-[9px] tracking-[0.4em] text-zinc-500 mb-1">SYNC</div>
    <div id="score" class="text-5xl md:text-6xl font-black text-amber-300" style="text-shadow:0 0 18px rgba(255,195,0,.65),0 0 40px rgba(255,150,0,.25)">0</div>
    <div class="text-[9px] tracking-[0.3em] text-amber-200/60 mt-1">GOLD HITS</div>
  </div>

  <!-- Engine Readouts -->
  <div class="absolute left-[10%] md:left-[22%] top-[62%] -translate-y-1/2 text-center">
    <div class="text-[9px] tracking-widest text-zinc-500 mb-1">ENGINE • 1</div>
    <div id="leftVal" class="text-4xl md:text-5xl font-extrabold text-cyan-300 transition-all duration-300" style="text-shadow:0 0 14px rgba(0,220,255,.8)">3</div>
    <div class="mt-1 text-[10px] tracking-widest text-cyan-400/60">x = -1.1 • CW</div>
  </div>
  <div class="absolute right-[10%] md:right-[22%] top-[62%] -translate-y-1/2 text-center">
    <div class="text-[9px] tracking-widest text-zinc-500 mb-1">ENGINE • 2</div>
    <div id="rightVal" class="text-4xl md:text-5xl font-extrabold text-fuchsia-300 transition-all duration-300" style="text-shadow:0 0 14px rgba(255,80,255,.75)">3</div>
    <div class="mt-1 text-[10px] tracking-widest text-fuchsia-400/60">x = +1.1 • CCW</div>
  </div>

  <!-- Bottom -->
  <div class="absolute bottom-0 inset-x-0 p-4 md:p-6 flex flex-col items-center gap-3">
    <div id="sequence" class="hud-panel pointer-events-auto px-3 md:px-5 py-2.5 rounded-full flex items-center gap-1 text-[11px] md:text-[13px] tracking-[0.18em] max-w-[95vw] overflow-x-auto whitespace-nowrap"></div>
    <div class="flex items-center gap-2.5 pointer-events-auto">
      <button id="stepBtn" class="hud-panel px-6 py-2.5 rounded-full text-xs tracking-[0.25em] hover:bg-white/10 active:scale-95 transition">STEP</button>
      <button id="autoBtn" class="hud-panel px-6 py-2.5 rounded-full text-xs tracking-[0.25em] hover:bg-white/10 active:scale-95 transition">AUTO</button>
      <button id="resetBtn" class="hud-panel px-4 py-2.5 rounded-full text-[11px] tracking-widest text-zinc-400 hover:bg-white/10 active:scale-95 transition">RESET</button>
    </div>
    <div class="text-[10px] tracking-[0.38em] text-zinc-600">x2 x inf = rep = perp =1</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: 'high-performance' });
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.055);

const camera = new THREE.PerspectiveCamera(48, innerWidth/innerHeight, 0.1, 50);
camera.position.set(0, 1.25, 3.6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 2.2;
controls.maxDistance = 6.5;
controls.maxPolarAngle = Math.PI * 0.85;
controls.target.set(0,0.1,0);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// Composer for glow
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.35, 0.42, 0.12);
bloom.strength = 1.25;
bloom.radius = 0.5;
bloom.threshold = 0.15;
composer.addPass(bloom);

// Lights
scene.add(new THREE.AmbientLight(0x0b0f1a, 0.7));
const hemi = new THREE.HemisphereLight(0x1a0033, 0x001418, 0.35);
scene.add(hemi);
const key = new THREE.DirectionalLight(0xffffff, 0.55);
key.position.set(3,4,2);
scene.add(key);

// Iron-gold dust
const dustCount = 2800;
const dustGeo = new THREE.BufferGeometry();
const dPos = new Float32Array(dustCount*3);
const dCol = new Float32Array(dustCount*3);
const gold = new THREE.Color(0xb89565);
const iron = new THREE.Color(0x5a3f21);
for(let i=0;i<dustCount;i++){
  const r = 3.5 + Math.random()*5.5;
  const th = Math.random()*Math.PI*2;
  const ph = Math.acos(THREE.MathUtils.randFloatSpread(2));
  dPos[i*3] = r*Math.sin(ph)*Math.cos(th);
  dPos[i*3+1] = r*Math.cos(ph)*0.6;
  dPos[i*3+2] = r*Math.sin(ph)*Math.sin(th);
  const c = gold.clone().lerp(iron, Math.random()*0.6);
  dCol[i*3]=c.r; dCol[i*3+1]=c.g; dCol[i*3+2]=c.b;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dPos,3));
dustGeo.setAttribute('color', new THREE.BufferAttribute(dCol,3));
const dustMat = new THREE.PointsMaterial({ size:0.018, vertexColors:true, transparent:true, opacity:0.72, blending:THREE.AdditiveBlending, depthWrite:false });
const dust = new THREE.Points(dustGeo, dustMat);
scene.add(dust);

// FULCRUM 0
const fulcrum = new THREE.Group();
scene.add(fulcrum);

const coreMat = new THREE.MeshPhysicalMaterial({
  color: 0x6aefff, emissive:0x00b7ff, emissiveIntensity:2.8,
  roughness:0.08, metalness:0.05, transmission:0.6, thickness:0.8, ior:1.4, clearcoat:1, clearcoatRoughness:0.1
});
const core = new THREE.Mesh(new THREE.SphereGeometry(0.135, 64, 64), coreMat);
fulcrum.add(core);

const glowTeal = new THREE.Mesh(new THREE.SphereGeometry(0.24, 32, 32), new THREE.MeshBasicMaterial({ color:0x00e5ff, transparent:true, opacity:0.16, blending:THREE.AdditiveBlending, side:THREE.BackSide }));
const glowPurple = new THREE.Mesh(new THREE.SphereGeometry(0.31, 32, 32), new THREE.MeshBasicMaterial({ color:0x8a2be2, transparent:true, opacity:0.13, blending:THREE.AdditiveBlending, side:THREE.BackSide }));
fulcrum.add(glowTeal, glowPurple);

const fulcrumRing = new THREE.Mesh(new THREE.TorusGeometry(0.20, 0.006, 16, 96), new THREE.MeshStandardMaterial({ color:0x00161b, emissive:0x00eaff, emissiveIntensity:1.8, metalness:0.9, roughness:0.2 }));
fulcrumRing.rotation.x = Math.PI/2;
fulcrum.add(fulcrumRing);

// Beam through fulcrum
const beamMat = new THREE.MeshStandardMaterial({ color:0x00eaff, emissive:0x00d5ff, emissiveIntensity:1.2, transparent:true, opacity:0.28 });
const beam = new THREE.Mesh(new THREE.CylinderGeometry(0.0035,0.0035,2.2,12), beamMat);
beam.rotation.z = Math.PI/2;
scene.add(beam);

// CHAOS ENGINES
function makeEngine(x, dir){
  const g = new THREE.Group();
  g.position.x = x;
  scene.add(g);

  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.19,0.23,0.055,36), new THREE.MeshStandardMaterial({ color:0x07090f, metalness:0.85, roughness:0.35, emissive:0x002233, emissiveIntensity:0.25 }));
  base.rotation.x = Math.PI/2;
  g.add(base);

  const ring = new THREE.Group();
  g.add(ring);

  const cubeMat = new THREE.MeshStandardMaterial({ color:0x040508, metalness:0.97, roughness:0.18 });
  const cubes=[];
  const R=0.36;
  for(let i=0;i<8;i++){
    const a = i*Math.PI*2/8;
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.112,0.112), cubeMat.clone());
    m.position.set(Math.cos(a)*R, Math.sin(a)*R, 0.02);
    m.rotation.z = a;
    m.castShadow = false;
    ring.add(m); cubes.push(m);
  }

  const torus = new THREE.Mesh(new THREE.TorusGeometry(R,0.012,16,72), new THREE.MeshStandardMaterial({ color:0x0a0f14, metalness:0.9, roughness:0.22, emissive: dir<0?0x00aaff:0xcc00ff, emissiveIntensity:0.22 }));
  g.add(torus);

  const coreMat = new THREE.MeshPhysicalMaterial({ color:0x0b0e15, metalness:1, roughness:0.12, clearcoat:1, emissive: dir<0?0x00d5ff:0xff2ad5, emissiveIntensity:0.55 });
  const ccore = new THREE.Mesh(new THREE.SphereGeometry(0.062,32,32), coreMat);
  g.add(ccore);

  const halo = new THREE.Mesh(new THREE.RingGeometry(0.425,0.47,64), new THREE.MeshBasicMaterial({ color: dir<0?0x00ddff:0xff3de0, transparent:true, opacity:0.14, side:THREE.DoubleSide, blending:THREE.AdditiveBlending }));
  halo.rotation.x = Math.PI/2;
  g.add(halo);

  const light = new THREE.PointLight(dir<0?0x00ccff:0xff3be8, 0.9, 1.8);
  light.position.set(0,0,0.15);
  g.add(light);

  return { g, ring, cubes, core: ccore, halo, torus, dir };
}
const left = makeEngine(-1.1, -1);
const right = makeEngine(1.1, 1);

// Engine connecting arcs to fulcrum
function makeArc(x){
  const curve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(x,0,0),
    new THREE.Vector3(x*0.55,0.12,0),
    new THREE.Vector3(0,0,0)
  ]);
  const geo = new THREE.TubeGeometry(curve, 24, 0.0025, 8, false);
  const mat = new THREE.MeshBasicMaterial({ color:0x00eaff, transparent:true, opacity:0.18 });
  return new THREE.Mesh(geo, mat);
}
scene.add(makeArc(-1.1), makeArc(1.1));

// SEQUENCE LOGIC
const SEQ = [3,1,0,1,0,2,1,0,1,'fin'];
const seqEl = document.getElementById('sequence');
SEQ.forEach((v,i)=>{
  const s = document.createElement('span');
  s.textContent = v;
  s.dataset.idx = i;
  s.className = 'px-1.5 py-0.5 rounded-md transition-all duration-300 text-zinc-400';
  seqEl.appendChild(s);
  if(i < SEQ.length-1){
    const eq = document.createElement('span');
    eq.textContent = '=';
    eq.className = 'opacity-25 mx-0.5';
    seqEl.appendChild(eq);
  }
});

const leftVal = document.getElementById('leftVal');
const rightVal = document.getElementById('rightVal');
const scoreEl = document.getElementById('score');
const stepBtn = document.getElementById('stepBtn');
const autoBtn = document.getElementById('autoBtn');
const resetBtn = document.getElementById('resetBtn');

let step = 0, score = 0, auto = false, autoTimer = null;
let flashUntil = 0, shake = 0;

function updateSequenceUI(){
  seqEl.querySelectorAll('span[data-idx]').forEach(el=>{
    const active = +el.dataset.idx === step;
    el.classList.toggle('text-amber-300', active);
    el.classList.toggle('bg-amber-400/10', active);
    el.classList.toggle('ring-1', active);
    el.classList.toggle('ring-amber-400/30', active);
    el.classList.toggle('scale-110', active);
    el.classList.toggle('text-zinc-300', !active);
  });
}

function setStep(i){
  step = (i + SEQ.length) % SEQ.length;
  const v = SEQ[step];
  leftVal.textContent = v;
  rightVal.textContent = v;
  updateSequenceUI();

  const num = v==='fin' ? 1 : Number(v);
  const s = 0.88 + num*0.09;
  left.cubes.forEach((c,idx)=>{ c.scale.setScalar(s - Math.sin(idx+step)*0.02); });
  right.cubes.forEach((c,idx)=>{ c.scale.setScalar(s - Math.cos(idx+step)*0.02); });

  left.core.material.emissiveIntensity = 0.5 + num*0.12;
  right.core.material.emissiveIntensity = 0.5 + num*0.12;

  if(v===0){
    // SYNC HIT
    flashUntil = performance.now() + 700;
    shake = 0.035;
    score++;
    scoreEl.textContent = score;
    leftVal.classList.add('zero-flash');
    rightVal.classList.add('zero-flash');
    setTimeout(()=>{leftVal.classList.remove('zero-flash');rightVal.classList.remove('zero-flash');}, 700);
    // gold flash
    coreMat.emissive.setHex(0xffd26a);
    coreMat.emissiveIntensity = 5.2;
    beamMat.emissive.setHex(0xffc400);
    beamMat.emissiveIntensity = 3.5;
    beamMat.opacity = 1;
    left.halo.material.color.setHex(0xffd700); left.halo.material.opacity = 0.5;
    right.halo.material.color.setHex(0xffd700); right.halo.material.opacity = 0.5;
    left.core.material.emissive.setHex(0xffc46b);
    right.core.material.emissive.setHex(0xffc46b);
  }
  if(v==='fin'){
    // reset visual pulse
    flashUntil = performance.now() + 400;
    coreMat.emissive.setHex(0xb084ff);
    beamMat.emissive.setHex(0xaa7bff);
  }
}

function advance(){ setStep(step+1); }
function toggleAuto(){
  auto = !auto;
  autoBtn.textContent = auto ? 'AUTO: ON' : 'AUTO';
  autoBtn.classList.toggle('text-emerald-300', auto);
  if(auto){ autoTimer = setInterval(advance, 860); } else { clearInterval(autoTimer); }
}
function resetGame(){ score=0; scoreEl.textContent='0'; setStep(0); }

stepBtn.onclick = advance;
autoBtn.onclick = toggleAuto;
resetBtn.onclick = resetGame;

let dragging = false;
controls.addEventListener('start',()=>dragging=true);
controls.addEventListener('end',()=>setTimeout(()=>dragging=false,50));
renderer.domElement.addEventListener('click', ()=>{ if(!dragging) advance(); });

// INITIAL
setStep(0);
updateSequenceUI();

// ANIMATE
const clock = new THREE.Clock();
let prev = 0;
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = t - prev; prev = t;

  controls.update();

  // spin engines
  const spd = SEQ[step]==='fin' ? 0.25 : 1.0;
  left.ring.rotation.z -= dt * 1.15 * spd;
  right.ring.rotation.z += dt * 1.15 * spd;
  left.cubes.forEach(c=>{ c.rotation.x += 0.015; c.rotation.y += 0.011; });
  right.cubes.forEach(c=>{ c.rotation.x -= 0.013; c.rotation.y -= 0.009; });

  // fulcrum breathe
  const breathe = 1 + Math.sin(t*2.1)*0.045;
  const isFlash = performance.now() < flashUntil;
  const flashBoost = isFlash ? 1 + (flashUntil - performance.now())/700 * 0.28 : 0;
  fulcrum.scale.setScalar(breathe + flashBoost);
  glowTeal.rotation.y = t*0.24;
  glowPurple.rotation.y = -t*0.18;
  fulcrumRing.rotation.z = t*0.6;

  // recover colors after flash
  if(!isFlash){
    coreMat.emissive.lerpColors(new THREE.Color(0xffd26a), new THREE.Color(0x00b7ff), 0.06);
    if(coreMat.emissiveIntensity>2.9) coreMat.emissiveIntensity = THREE.MathUtils.lerp(coreMat.emissiveIntensity, 2.8, 0.08);
    beamMat.emissive.lerpColors(new THREE.Color(0xffc400), new THREE.Color(0x00d5ff), 0.07);
    beamMat.emissiveIntensity = THREE.MathUtils.lerp(beamMat.emissiveIntensity, 1.2, 0.06);
    beamMat.opacity = THREE.MathUtils.lerp(beamMat.opacity, 0.26, 0.05);
    left.halo.material.opacity = THREE.MathUtils.lerp(left.halo.material.opacity, 0.14, 0.05);
    right.halo.material.opacity = THREE.MathUtils.lerp(right.halo.material.opacity, 0.14, 0.05);
    left.halo.material.color.lerp(new THREE.Color(0x00ddff), 0.06);
    right.halo.material.color.lerp(new THREE.Color(0xff3de0), 0.06);
    left.core.material.emissive.lerp(new THREE.Color(0x00d5ff), 0.06);
    right.core.material.emissive.lerp(new THREE.Color(0xff2ad5), 0.06);
  }

  // dust drift
  dust.rotation.y += dt*0.015;
  dust.rotation.x = Math.sin(t*0.07)*0.08;

  // camera shake on sync
  if(shake>0.0001){
    camera.position.x += (Math.random()-0.5)*shake;
    camera.position.y += (Math.random()-0.5)*shake;
    shake *= 0.88;
  }

  composer.render();
}
animate();

// RESIZE
function onResize(){
  const w = innerWidth, h = innerHeight;
  camera.aspect = w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h); composer.setSize(w,h);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
}
addEventListener('resize', onResize);
onResize();
</script>
</body>
</html>
